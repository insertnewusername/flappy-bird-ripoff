<!DOCTYPE html>
<html>
    <head>
<title>Flappy bird</title>
<link rel="stylesheet" href="styles.css"> 
    </head>

    <body>
<div id="startingscreen">Press spacebar to start</div>


        <script>
            // Remove the starting screen overlay when space pressed
            const startingscreen = document.getElementById('startingscreen');

                document.addEventListener("keydown", (event) => {
                    if (event.key == " ") {startingscreen.style.display = "none"}
                }) 
                
        </script>

<div class="background"></div>
<imc class="bird" src="floppy.png" alt="floppy-img">
<div class="message">
    Press Enter to Start the Game
</div>
<div class="score">
    <span class="score_title"></span>
    <span class="score_val"></span>
</div>
<script src="script.js"></script>
    </body>
</html>
